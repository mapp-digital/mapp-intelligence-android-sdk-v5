name: Upload to Maven Central

on:
  workflow_dispatch:

env:
  CI: "true"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Debug directory
        run: |
          ls -R .

      - name: Create local.properties
        run: |
          echo "mavenCentralUsername=${{ secrets.MAVEN_CENTRAL_USERNAME }}" >> local.properties
          echo "mavenCentralPassword=${{ secrets.MAVEN_CENTRAL_PASSWORD }}" >> local.properties
          echo "signing.keyId=${{ secrets.SIGNING_KEY_ID }}" >> local.properties
          echo "signing.password=${{ secrets.SIGNING_KEY_PASSWORD }}" >> local.properties
          echo "signing.keyBase64=${{ secrets.SIGNING_KEY_ASC }}" >> local.properties
          echo "trackIds=${{ secrets.TRACK_IDS }}" >> local.properties
          echo "trackDomain=${{ secrets.TRACK_DOMAIN }}" >> local.properties

      - name: Make gradle executable
        run: chmod +x gradlew

      - name: Read SDK version
        id: sdk_version
        run: |
          version="$(sed -n 's/^VERSION_NAME=//p' android-sdk/gradle.properties)"
          if [[ -z "$version" ]]; then
            echo "VERSION_NAME is missing from android-sdk/gradle.properties" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Publish to Maven Central
        run: |
          ./gradlew \
          :android-sdk:clean \
          :android-sdk:testDebugUnitTest \
          :android-sdk:assembleRelease \
          :android-sdk:publishMavenPublicationToMavenLocal \
          :android-sdk:uploadToCentralPortal \
          -x test \
          -x check \
          --stacktrace --no-daemon

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_NAME: ${{ steps.sdk_version.outputs.version }}
        run: |
          gh release create "$VERSION_NAME" \
            --target "${{ github.sha }}" \
            --title "Mapp Intelligence SDK $VERSION_NAME" \
            --generate-notes
